{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 中俄贸易供需服务平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .register-card {
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        .register-title {
            text-align: center;
            color: #2b57af;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'trade:index' %}">
                中国-俄罗斯<br><small>China-Russia</small>
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav w-100 justify-content-center gap-5">
                    <li class="nav-item"><a class="nav-link" href="{% url 'trade:index' %}">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'trade:order_list' %}?flag=2">国际采购</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'trade:order_list' %}?flag=1">国际供应</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'trade:transport_list' %}">国际物流</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'trade:news_list' %}">新闻与资讯</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">关于我们</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 注册表单 -->
    <div class="container">
        <div class="register-card">
            <h3 class="register-title">用户注册</h3>

            {% if error_msg %}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    {{ error_msg }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endif %}

            <form method="post" action="{% url 'trade:register' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="username" class="form-label">用户名</label>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="请设置用户名" required autofocus>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">密码</label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="请设置密码（至少8位）" required>
                </div>

                <div class="mb-3">
                    <label for="password2" class="form-label">确认密码</label>
                    <input type="password" class="form-control" id="password2" name="password2"
                           placeholder="请再次输入密码" required>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success">注册</button>
                </div>

                <div class="text-center mt-3">
                    <span class="text-muted">已有账号？</span>
                    <a href="{% url 'trade:login' %}" class="text-primary">立即登录</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
