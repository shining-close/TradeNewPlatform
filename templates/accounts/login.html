{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 中俄贸易供需服务平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        .login-card {
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        .login-title {
            text-align: center;
            color: #2b57af;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏（复用base的导航） -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'trade:index' %}">
                中国-俄罗斯<br><small>China-Russia</small>
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav w-100 justify-content-center gap-5">
                    <li class="nav-item"><a class="nav-link" href="{% url 'trade:index' %}">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'trade:order_list' %}?flag=2">国际采购</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'trade:order_list' %}?flag=1">国际供应</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'trade:transport_list' %}">国际物流</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'trade:news_list' %}">新闻与资讯</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">关于我们</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 登录表单 -->
    <div class="container">
        <div class="login-card">
            <h3 class="login-title">用户登录</h3>

            <!-- 错误提示 -->
            {% if error_msg %}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                    {{ error_msg }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endif %}

            <!-- 登录表单 -->
            <form method="post" action="{% url 'trade:login' %}">
                {% csrf_token %}
                <!-- 隐藏跳转参数：登录后返回原页面 -->
                <input type="hidden" name="next" value="{{ next }}">

                <div class="mb-3">
                    <label for="username" class="form-label">用户名</label>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="请输入用户名" required autofocus>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">密码</label>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="请输入密码" required>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                    <label class="form-check-label" for="remember">记住我</label>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">登录</button>
                </div>

                <!-- 注册跳转 -->
                <div class="text-center mt-3">
                    <span class="text-muted">还没有账号？</span>
                    <a href="{% url 'trade:register' %}" class="text-primary">立即注册</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
