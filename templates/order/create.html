{% extends 'base.html' %}

{% block title %}发布{% if flag == '2' %}采购需求{% else %}供应信息{% endif %} - 中俄贸易平台{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="bg-primary text-white py-4 mb-4 text-center">
        <h2 class="mb-0">发布{% if flag == '2' %}采购需求{% else %}供应信息{% endif %}</h2>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <input type="hidden" name="flag" value="{{ flag }}">

                        <div class="mb-3">
                            <label for="title" class="form-label">订单标题 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="title" name="title" required>
                        </div>

                        <!-- 新增：订单图片上传 -->
<div class="mb-3">
    <label for="image" class="form-label">订单图片（可选）</label>
    <input type="file" class="form-control" id="image" name="image" accept="image/*">
    <div class="form-text">支持 jpg/png 格式，建议尺寸 800x600px</div>
</div>

                        <div class="mb-3">
                            <label for="category" class="form-label">行业分类</label>
                            <input type="text" class="form-control" id="category" name="category" placeholder="例如：农产品/机械设备">
                        </div>

                        <div class="mb-3">
                            <label for="content" class="form-label">订单详情 <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="content" name="content" rows="6" required></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="end_time" class="form-label">截止时间</label>
                            <input type="datetime-local" class="form-control" id="end_time" name="end_time">
                        </div>

                        <div class="mb-3">
                            <label for="transport" class="form-label">关联物流</label>
                            <select class="form-select" id="transport" name="transport">
                                <option value="">不关联</option>
                                {% for t in transports %}
                                <option value="{{ t.id }}">{{ t.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">提交发布</button>
                            <a href="{% url 'trade:order_list' %}?flag={{ flag }}" class="btn btn-outline-secondary">取消返回</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
